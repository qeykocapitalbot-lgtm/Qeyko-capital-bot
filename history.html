<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique des Transactions</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #fafafa; 
            margin: 0; 
            padding: 20px; 
        }
        .header { 
            display: flex; 
            align-items: center; 
            margin-bottom: 20px; 
        }
        .back-btn { 
            font-size: 24px; 
            text-decoration: none; 
            color: #333; 
            margin-right: 15px; 
            cursor: pointer;
        }
        h2 { 
            margin: 0; 
            font-size: 20px; 
            color: #333; 
        }
        
        /* Style bwat gri yo ekzakteman jan w vle l la */
        .notif-box {
            display: flex; 
            align-items: center;
            background-color: #e6e6e6;
            border: 1.5px dashed #b3b3b3;
            border-radius: 8px; 
            padding: 12px 15px; 
            margin-bottom: 12px;
        }
        .notif-icon { 
            font-size: 22px; 
            margin-right: 15px; 
        }
        .notif-content { 
            display: flex; 
            flex-direction: column; 
        }
        .notif-title { 
            margin: 0; 
            font-size: 16px; 
            font-weight: 500; 
            color: #555; 
        }
        .notif-date { 
            margin: 4px 0 0 0; 
            font-size: 13px; 
            color: #999; 
        }
        .empty-msg { 
            text-align: center; 
            color: #999; 
            margin-top: 50px; 
            font-size: 16px; 
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-btn" onclick="window.location.href='index.html'">⬅️</div>
        <h2>Historique</h2>
    </div>

    <div id="historyList">
        </div>

    <script>
        // Chaje done kliyan an ki nan memwa local la
        let userData = JSON.parse(localStorage.getItem('userData')) || {};
        const historyList = document.getElementById("historyList");

        // Si pa gen okenn transaksyon ki fèt, li di paj la vid
        if (!userData.transactions || userData.transactions.length === 0) {
            historyList.innerHTML = '<p class="empty-msg">Aucune transaction pour le moment.</p>';
        } else {
            historyList.innerHTML = ""; // Netwaye zòn nan anvan l afiche
            
            // Li chak transaksyon epi kreye bwat gri yo otomatikman
            userData.transactions.forEach(tx => {
                historyList.innerHTML += `
                    <div class="notif-box">
                        <div class="notif-icon">📩</div>
                        <div class="notif-content">
                            <p class="notif-title">${tx.title}</p>
                            <p class="notif-date">${tx.date}</p>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
