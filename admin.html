<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Qeyko Capital - Admin Panel</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172e; color: #fff; }
.login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-box { background: #1a2847; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
.login-box h1 { font-size: 2rem; margin-bottom: 8px; text-align: center; color: #00d4ff; }
.login-box p { text-align: center; color: #888; margin-bottom: 30px; font-size: 0.9rem; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 0.9rem; margin-bottom: 8px; color: #bbb; }
.form-group input { width: 100%; padding: 12px; border: 1.5px solid #2a3f5f; background: #0f172e; color: #fff; border-radius: 8px; font-size: 1rem; outline: none; transition: border-color 0.3s; }
.form-group input:focus { border-color: #00d4ff; }
.login-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #0066cc, #00d4ff); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
.login-btn:hover { transform: translateY(-2px); }
.error { color: #ff4444; text-align: center; margin-bottom: 20px; font-size: 0.9rem; }

.dashboard { display: none; min-height: 100vh; padding: 20px; }
.dashboard.show { display: block; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
.header h1 { font-size: 1.8rem; color: #00d4ff; }
.logout-btn { padding: 8px 16px; background: #ff4444; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: 600; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
.stat-card { background: #1a2847; padding: 20px; border-radius: 12px; border-left: 4px solid #00d4ff; }
.stat-label { color: #888; font-size: 0.9rem; margin-bottom: 8px; }
.stat-value { font-size: 2rem; font-weight: 700; color: #00d4ff; }

.section { background: #1a2847; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.section h2 { font-size: 1.3rem; margin-bottom: 20px; color: #00d4ff; padding-bottom: 10px; border-bottom: 1px solid #2a3f5f; }

.users-table, .withdrawals-table { width: 100%; border-collapse: collapse; }
.users-table th, .withdrawals-table th { background: #0f172e; padding: 12px; text-align: left; font-weight: 600; color: #00d4ff; border-bottom: 2px solid #2a3f5f; font-size: 0.9rem; }
.users-table td, .withdrawals-table td { padding: 12px; border-bottom: 1px solid #2a3f5f; }
.users-table tr:hover, .withdrawals-table tr:hover { background: #233050; }

.status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
.status-pending { background: #ff9800; color: white; }
.status-completed { background: #4caf50; color: white; }
.status-active { background: #4caf50; color: white; }

.loading { text-align: center; padding: 20px; color: #888; }
</style>
</head>
<body>

<div class="login-container" id="loginContainer">
<div class="login-box">
<h1>🔐 Admin Panel</h1>
<p>Qeyko Capital</p>
<div class="error" id="errorMsg" style="display:none;"></div>
<form onsubmit="handleLogin(event)">
<div class="form-group">
<label>Mot de passe Admin</label>
<input type="password" id="adminPassword" placeholder="Entrez le mot de passe" required/>
</div>
<button type="submit" class="login-btn">Se connecter</button>
</form>
</div>
</div>

<div class="dashboard" id="dashboard">
<div class="header">
<h1>📊 Tableau de Bord Admin</h1>
<button class="logout-btn" onclick="handleLogout()">Déconnexion</button>
</div>

<div class="stats-grid">
<div class="stat-card">
<div class="stat-label">Total Utilisateurs</div>
<div class="stat-value" id="totalUsers">0</div>
</div>
<div class="stat-card">
<div class="stat-label">Total Revenu</div>
<div class="stat-value">$<span id="totalRevenue">0</span></div>
</div>
<div class="stat-card">
<div class="stat-label">Retraits En Attente</div>
<div class="stat-value" id="pendingWithdrawals">0</div>
</div>
<div class="stat-card">
<div class="stat-label">Retraits Complétés</div>
<div class="stat-value" id="completedWithdrawals">0</div>
</div>
</div>

<div class="section">
<h2>👥 Utilisateurs Actifs</h2>
<div id="usersContainer" class="loading">Chargement...</div>
</div>

<div class="section">
<h2>💰 Retraits</h2>
<div id="withdrawalsContainer" class="loading">Chargement...</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC-MfhsLGezx1v5Lx1pxOTzGf7V0PcKQqs",
  authDomain: "qeyko-capital-bot.firebaseapp.com",
  projectId: "qeyko-capital-bot",
  storageBucket: "qeyko-capital-bot.firebasestorage.app",
  messagingSenderId: "299374324488",
  appId: "1:299374324488:web:de1550eb9c845cc6ca9abd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PASSWORD = "QeykoAdmin2024";

window.handleLogin = async (event) => {
  event.preventDefault();
  const password = document.getElementById('adminPassword').value;
  
  if (password === ADMIN_PASSWORD) {
    sessionStorage.setItem('adminLoggedIn', 'true');
    document.getElementById('loginContainer').style.display = 'none';
    document.getElementById('dashboard').classList.add('show');
    loadDashboardData();
  } else {
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.textContent = '❌ Mot de passe incorrect';
    errorMsg.style.display = 'block';
  }
};

window.handleLogout = () => {
  sessionStorage.removeItem('adminLoggedIn');
  location.reload();
};

async function loadDashboardData() {
  try {
    const usersSnap = await getDocs(collection(db, 'users'));
    const users = [];
    let totalRevenue = 0;
    let pendingWithdrawals = 0;
    let completedWithdrawals = 0;
    
    usersSnap.forEach(doc => {
      const user = doc.data();
      users.push(user);
      totalRevenue += user.balance || 0;
      
      if (user.withdrawals) {
        user.withdrawals.forEach(w => {
          if (w.status === 'pending') pendingWithdrawals++;
          if (w.status === 'completed') completedWithdrawals++;
        });
      }
    });
    
    document.getElementById('totalUsers').textContent = users.length;
    document.getElementById('totalRevenue').textContent = totalRevenue.toFixed(2);
    document.getElementById('pendingWithdrawals').textContent = pendingWithdrawals;
    document.getElementById('completedWithdrawals').textContent = completedWithdrawals;
    
    renderUsers(users);
    renderWithdrawals(users);
  } catch (err) {
    console.error('Load error:', err);
  }
}

function renderUsers(users) {
  const html = `<table class="users-table">
    <thead><tr><th>Nom</th><th>ID</th><th>Solde</th><th>Statut</th><th>Filleuls</th></tr></thead>
    <tbody>${users.map(u => `<tr>
      <td>${u.name}</td>
      <td><code>${u.uid.substring(0,8)}...</code></td>
      <td>$${(u.balance || 0).toFixed(2)}</td>
      <td><span class="status-badge status-active">Actif</span></td>
      <td>${(u.refs || []).length}</td>
    </tr>`).join('')}</tbody>
  </table>`;
  document.getElementById('usersContainer').innerHTML = html;
}

function renderWithdrawals(users) {
  const withdrawals = [];
  users.forEach(user => {
    if (user.withdrawals) {
      user.withdrawals.forEach(w => {
        withdrawals.push({...w, userName: user.name, userId: user.uid});
      });
    }
  });
  
  const html = `<table class="withdrawals-table">
    <thead><tr><th>Utilisateur</th><th>Montant</th><th>Adresse</th><th>Statut</th><th>Date</th></tr></thead>
    <tbody>${withdrawals.map(w => `<tr>
      <td>${w.userName}</td>
      <td>$${w.amount.toFixed(2)}</td>
      <td><code>${w.addr.substring(0,12)}...</code></td>
      <td><span class="status-badge status-${w.status}">${w.status === 'pending' ? 'En Attente' : 'Complété'}</span></td>
      <td>${new Date(w.date).toLocaleString()}</td>
    </tr>`).join('')}</tbody>
  </table>`;
  document.getElementById('withdrawalsContainer').innerHTML = html;
}

if (sessionStorage.getItem('adminLoggedIn')) {
  document.getElementById('loginContainer').style.display = 'none';
  document.getElementById('dashboard').classList.add('show');
  loadDashboardData();
}

</script>
</body>
</html>
